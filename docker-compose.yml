version: '3.9'

services:
  cios_db:
    image: postgres:15-alpine
    container_name: medical_cios_postgres
    environment:
      POSTGRES_DB: cios_db
      POSTGRES_USER: cios_user
      POSTGRES_PASSWORD: cios_secret
    ports:
      - "5432:5432"
    volumes:
      - cios_postgres_data:/var/lib/postgresql/data
      - ./cios_v6/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cios_user -d cios_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  cios_redis:
    image: redis:7-alpine
    container_name: medical_cios_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - cios_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cios_backend:
    build:
      context: ./cios_v6/backend
      dockerfile: Dockerfile
    container_name: medical_cios_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cios_user:cios_secret@cios_db:5432/cios_db
      ICU_DATABASE_URL: postgresql://icu_user:icu_password@icu_postgres:5432/icu_monitoring
      REDIS_URL: redis://cios_redis:6379
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_ALGORITHM: HS256
      ENVIRONMENT: production
    depends_on:
      cios_db:
        condition: service_healthy
      cios_redis:
        condition: service_healthy
      icu_postgres:
        condition: service_healthy
    volumes:
      - ./cios_v6/backend:/app
      - cios_reports_data:/app/reports
    command:
      - sh
      - -c
      - |
        python - <<'PY'
        import socket, time

        def wait(host, port, timeout=60):
            for _ in range(timeout):
                try:
                    socket.create_connection((host, int(port)), 2).close()
                    return
                except Exception:
                    time.sleep(1)
            raise SystemExit(f'unable to connect to {host}:{port}')

        wait('cios_db', 5432)
        wait('icu_postgres', 5432)
        PY
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  cios_frontend:
    build:
      context: ./cios_v6/frontend
      dockerfile: Dockerfile
    container_name: medical_cios_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_ICU_URL: http://localhost:5174
    depends_on:
      - cios_backend
    volumes:
      - ./cios_v6/frontend:/app
      - /app/node_modules

  cios_nginx:
    image: nginx:alpine
    container_name: medical_cios_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./cios_v6/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - cios_backend
      - cios_frontend

  icu_postgres:
    image: postgres:16-alpine
    container_name: medical_icu_postgres
    environment:
      POSTGRES_USER: icu_user
      POSTGRES_PASSWORD: icu_password
      POSTGRES_DB: icu_monitoring
    ports:
      - "5433:5432"
    volumes:
      - icu_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icu_user -d icu_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  icu_backend:
    build:
      context: ./ICU/backend
      dockerfile: Dockerfile
    container_name: medical_icu_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://icu_user:icu_password@icu_postgres:5432/icu_monitoring
      PYTHONPATH: /app
      LOG_LEVEL: INFO
    ports:
      - "8001:8000"
    volumes:
      - ./ICU/backend:/app
      - /app/__pycache__
    depends_on:
      icu_postgres:
        condition: service_healthy
    command: >
      sh -c "python -c 'from app.database import init_db; init_db()' &&
             python app/ml/train_model.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  icu_simulator:
    build:
      context: ./ICU/backend
      dockerfile: Dockerfile
    container_name: medical_icu_simulator
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://icu_user:icu_password@icu_postgres:5432/icu_monitoring
      PYTHONPATH: /app
    volumes:
      - ./ICU/backend:/app
      - /app/__pycache__
    depends_on:
      - icu_backend
    healthcheck:
      disable: true
    command: >
      sh -c "sleep 15 && python -c 'import asyncio; from simulator.icu_simulator import ICUSimulator; sim = ICUSimulator(); asyncio.run(sim.start())'"

  icu_frontend:
    build:
      context: ./ICU/frontend
      dockerfile: Dockerfile
    container_name: medical_icu_frontend
    restart: unless-stopped
    ports:
      - "5174:5173"
    volumes:
      - ./ICU/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8001
      - VITE_WS_URL=ws://localhost:8001
    depends_on:
      - icu_backend

volumes:
  cios_postgres_data:
  cios_redis_data:
  cios_reports_data:
  icu_postgres_data:
